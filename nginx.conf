# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name simpletestdomain.sbs www.simpletestdomain.sbs;
    
    # Для Let's Encrypt проверки
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Редирект всех остальных запросов на HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS конфигурация
server {
    listen 443 ssl http2;
    server_name simpletestdomain.sbs www.simpletestdomain.sbs;

    # SSL сертификаты (путь будет настроен certbot)
    ssl_certificate /etc/letsencrypt/live/simpletestdomain.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simpletestdomain.sbs/privkey.pem;

    # SSL настройки безопасности
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Логирование
    access_log /var/log/nginx/blackfish-access.log;
    error_log /var/log/nginx/blackfish-error.log;

    # Максимальный размер тела запроса
    client_max_body_size 10M;

    # Таймауты (соответствуют настройкам Fastify)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Заголовки для проксирования (важно для trustProxy в Fastify)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Отключение буферизации для real-time ответов
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://127.0.0.1:3035;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3035/health;
        access_log off;
    }
}

